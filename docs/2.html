<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Node Prototype 2</title>
  <style>
    :root{--fg:#0f172a;--muted:#64748b}
    *{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
    body{margin:0;padding:16px;background:#f8fafc}
    .node{width:300px;border:2px solid #0f172a;background:#fff}
    .hd{padding:8px 10px;border-bottom:2px solid #0f172a;background:#0f172a;color:#fff;font-size:12px;font-weight:800}
    .bd{padding:10px}
    .tabs{display:grid;grid-template-columns:1fr 1fr;border:2px solid #0f172a;margin-bottom:8px}
    .tab{padding:6px 8px;font-size:11px;font-weight:700;border-right:2px solid #0f172a;background:#fff}
    .tab:last-child{border-right:0}
    .tab.active{background:#0f172a;color:#fff}
    .panel{border:2px solid #0f172a;padding:8px;background:#f8fafc;min-height:170px}
    .row{display:flex;justify-content:space-between;gap:8px;padding:4px 0;font-size:11px}
    .bar{height:8px;border:2px solid #0f172a;background:#fff;margin-top:6px;position:relative}
    .fill{height:100%;background:#0f172a}
    .muted{color:var(--muted);font-size:10px}
    .tag{font-size:10px;padding:1px 6px;border:2px solid #0f172a;background:#fff}
  </style>
</head>
<body>
  <section class="node">
    <div class="hd">结果预览（节点内双Tab）</div>
    <div class="bd">
      <div class="tabs">
        <div class="tab active">分类视图</div>
        <div class="tab">处理视图</div>
      </div>

      <!-- 分类视图 -->
      <div class="panel">
        <div class="row"><b>总条目 24</b><span class="muted">top-level 6</span></div>
        <div class="bar"><div class="fill" style="width:52%"></div></div>
        <div class="row"><span>video</span><span>12</span></div>
        <div class="bar"><div class="fill" style="width:28%"></div></div>
        <div class="row"><span>manga</span><span>7</span></div>
        <div class="bar"><div class="fill" style="width:14%"></div></div>
        <div class="row"><span>photo</span><span>3</span></div>
        <hr>
        <div class="row"><span>entries/欧美/电影合集</span><span class="tag">video 0.93</span></div>
        <div class="row"><span>entries/日漫/长篇</span><span class="tag">manga 0.91</span></div>
      </div>

      <!-- 如果切到处理视图，替换为下面内容 -->
      <!--
      <div class="panel">
        <div class="row"><b>目录 12</b><span class="muted">步骤 41</span></div>
        <div class="row"><span>成功目录</span><span class="tag">10</span></div>
        <div class="row"><span>失败目录</span><span class="tag">2</span></div>
        <hr>
        <div class="row"><span>rename-node</span><span class="tag">succeeded</span></div>
        <div class="row"><span>move-node</span><span class="tag">moved</span></div>
        <div class="row"><span>thumbnail-node</span><span class="tag">failed</span></div>
        <div class="muted">失败目录: /entries/欧美/电影合集/坏片源</div>
      </div>
      -->
    </div>
  </section>
</body>
</html>
